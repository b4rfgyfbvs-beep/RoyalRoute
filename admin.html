<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Royal Route Industries</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#0b0d12;--white:#e8edf5;--gold:#2a9d4e;--gold-light:#34c45a;--gray:#141820;--gray-mid:#1e2435;--gray-light:#888}
    body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:var(--gray);border:1px solid var(--gray-mid);padding:48px 40px;max-width:480px;width:100%;text-align:center}
    h1{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;margin-bottom:8px}
    h1 span{color:var(--gold)}
    .sub{font-size:14px;color:var(--gray-light);margin-bottom:32px;line-height:1.6}
    input[type="password"]{width:100%;background:var(--black);border:1px solid #333;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 16px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:4px}
    input:focus{border-color:var(--gold)}
    .btn{width:100%;border:none;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:16px;cursor:pointer;margin-bottom:10px;transition:background 0.2s}
    .btn-login{background:var(--gold);color:#000}
    .btn-login:hover{background:var(--gold-light)}
    .error{color:#e74c3c;font-size:13px;margin-bottom:16px;min-height:18px}
    .dashboard{display:none}
    .dashboard.visible{display:block}
    .status-box{background:var(--black);border:1px solid var(--gray-mid);padding:20px;margin-bottom:24px}
    .status-box p{font-size:15px;color:var(--gray-light);line-height:1.8}
    .status-box strong{color:var(--gold);font-size:18px}
    .btn-open{background:#27ae60;color:#fff;width:100%;margin-bottom:10px}
    .btn-open:hover{background:#2ecc71}
    .btn-close{background:#c0392b;color:#fff;width:100%}
    .btn-close:hover{background:#e74c3c}
    .msg{padding:14px;font-size:14px;margin-bottom:16px;display:none}
    .msg.visible{display:block}
    .msg.success{background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.3);color:#2ecc71}
    .msg.error{background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.3);color:#e74c3c}
    .divider{border:none;border-top:1px solid var(--gray-mid);margin:24px 0}
    .logout{font-size:13px;color:#555;cursor:pointer;text-decoration:underline;margin-top:16px;display:inline-block}
    .logout:hover{color:var(--gray-light)}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div id="loginSection">
    <h1>ADMIN <span>ACCESS</span></h1>
    <p class="sub">Royal Route Industries — Site Control</p>
    <input type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"/>
    <div class="error" id="loginError"></div>
    <button class="btn btn-login" onclick="login()">ENTER</button>
  </div>

  <div class="dashboard" id="dashboard">
    <h1>SITE <span>CONTROL</span></h1>
    <p class="sub">Open or close your car search site instantly.</p>

    <div class="msg" id="actionMsg"></div>

    <div class="status-box" id="statusBox">
      <p>Loading status...</p>
    </div>

    <button class="btn btn-open" id="btnOpen" onclick="setSiteStatus('OPEN')">
      ✓ OPEN SITE
    </button>
    <button class="btn btn-close" id="btnClose" onclick="setSiteStatus('CLOSED')">
      ✕ CLOSE SITE
    </button>

    <hr class="divider"/>
    <span class="logout" onclick="logout()">Log out</span>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = 'royalroute2024';
  const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxqrSfuo-0V0EzZmZq1--7AMmB7xCzVqDG1nnAYomCEv4TF1h5eq-fF61QDgqkdvGmGxQ/exec';

  function login() {
    const pw = document.getElementById('passwordInput').value;
    const errEl = document.getElementById('loginError');
    if (!pw) { errEl.textContent = 'Please enter your password.'; return; }
    if (pw !== ADMIN_PASSWORD) { errEl.textContent = 'Incorrect password.'; return; }
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    loadStatus();
  }

  async function loadStatus() {
    try {
      const res = await fetch(`${GOOGLE_SHEET_URL}?action=status`);
      const data = await res.json();
      const isOpen = data.siteOpen;
      document.getElementById('statusBox').innerHTML = `
        <p>Site Status: <strong>${isOpen ? '✅ OPEN' : '🔴 CLOSED'}</strong></p>
      `;
    } catch(e) {
      document.getElementById('statusBox').innerHTML = '<p>Could not load status.</p>';
    }
  }

  async function setSiteStatus(status) {
    const msgEl = document.getElementById('actionMsg');
    msgEl.className = 'msg';
    document.getElementById('btnOpen').disabled = true;
    document.getElementById('btnClose').disabled = true;
    document.getElementById('btnOpen').innerHTML = '<span class="spinner"></span>UPDATING...';

    try {
      const res = await fetch(`${GOOGLE_SHEET_URL}?action=setStatus&status=${status}`);
      const data = await res.json();
      if (data.success) {
        msgEl.textContent = status === 'OPEN' ? '✓ Site is now OPEN!' : '✓ Site is now CLOSED!';
        msgEl.className = 'msg success visible';
        loadStatus();
      } else {
        msgEl.textContent = 'Something went wrong. Try again.';
        msgEl.className = 'msg error visible';
      }
    } catch(e) {
      msgEl.textContent = 'Connection error. Try again.';
      msgEl.className = 'msg error visible';
    }

    document.getElementById('btnOpen').disabled = false;
    document.getElementById('btnClose').disabled = false;
    document.getElementById('btnOpen').innerHTML = '✓ OPEN SITE';
  }

  function logout() {
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('passwordInput').value = '';
  }
</script>
</body>
</html>
